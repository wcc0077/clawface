<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad)"/>
  <!-- Claw marks - 3 curved lines -->
  <g stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M10 10 L10 22"/>
    <path d="M16 8 L16 24"/>
    <path d="M22 10 L22 22"/>
  </g>
  <!-- Small accent dots at bottom of claws -->
  <g fill="#fff">
    <circle cx="10" cy="23" r="1.5"/>
    <circle cx="16" cy="25" r="1.5"/>
    <circle cx="22" cy="23" r="1.5"/>
  </g>
</svg>
